[platformio]
default_envs = rpucomm

[env:rpucomm]
platform = teensy
board = teensy41
framework = arduino
# Add ./ as an include directory so that the src/ will be found
build_flags =
  -I./
lib_deps =
  https://github.com/kalnajslab-org/SerialComm.git
  etlcpp/Embedded Template Library@20.47.1

# Unit tests: use PROJECT TASKS -> General -> Advanced -> Test in the
# PlatformIO pane, or run: pio test -e test.
# Do NOT use Build/Upload (pio run -e test) — this env has no setup()/loop()
# because build_src_filter excludes main.cpp to avoid a duplicate-symbol
# conflict when test_rpurecord.cpp (which defines its own setup()/loop()) is
# linked in by the test runner. upload_port/monitor_port are pinned to the
# Teensy's USB CDC port pattern so the test runner doesn't attach to an
# unrelated serial device (e.g. a RACHUTS dock connection on a USB-serial
# adapter).
[env:test]
extends = env:rpucomm
test_build_src = yes
build_src_filter = -<*> +<RPUcomm.cpp>
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*
