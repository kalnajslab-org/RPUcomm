[env:rpucomm]
platform = teensy
board = teensy41
framework = arduino
# Add ./ as an include directory so that the src/ will be found
build_flags =
  -I./
lib_deps =
  https://github.com/kalnajslab-org/SerialComm.git
  etlcpp/Embedded Template Library

# Unit tests (run with: pio test -e test). Builds RPUcomm.cpp (but not
# main.cpp, which has its own setup()/loop()) alongside the test sources.
[env:test]
extends = env:rpucomm
test_build_src = yes
build_src_filter = -<*> +<RPUcomm.cpp>
